name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build:css

      - name: Prepare production config
        env:
          EMAIL_ENDPOINT: ${{ vars.EMAIL_ENDPOINT }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
        run: |
          cp config.js public-config.js
          sed -i "s|http://localhost:8787/send|${EMAIL_ENDPOINT}|g" public-config.js
          sed -i "s|1x00000000000000000000AA|${TURNSTILE_SITE_KEY}|g" public-config.js

      - name: Assemble static site
        run: |
          mkdir site
          cp index.html colors.js public-config.js site/config.js
          cp -r assets site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
